<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <title>Quizly Remote</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</head>

<body>
    <h1>Quizly Remote</h1>

    <div id="joinBox">
        <input type="text" id="nameInput" placeholder="Typ je naam">
        <button id="joinBtn">Deelnemen</button>
    </div>

    <div id="answerBox" style="display:none;">
        <h2>Kies een kleur:</h2>
        <button id="btnRed" style="background:red">Rood</button>
        <button id="btnBlue" style="background:blue">Blauw</button>
        <button id="btnGreen" style="background:green">Groen</button>
        <button id="btnYellow" style="background:yellow">Geel</button>
    </div>

    <div id="scoreOnlyBox" style="display:none;">
        <h2>Je score:</h2>
        <p id="myScore">0</p>
    </div>
</body>

</html>
